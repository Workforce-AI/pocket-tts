services:
  pocket-tts:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - pocket_tts_cache:/root/.cache/pocket_tts
      - hf_cache:/root/.cache/huggingface
    command: ["serve", "--host", "0.0.0.0", "--port", "8000", "--quantize"]
    restart: unless-stopped

volumes:
  pocket_tts_cache:
  hf_cache:
